<!DOCTYPE html>
<html>
<head>
    <title>Add Record</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<h2>Edit Record</h2>
<form method="POST">

</form>
<a href="/view">Back</a>
</body>
</html>
